<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512">
  <defs>
    <radialGradient id="lens-glass" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e8f0fe" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#dce6f5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8d8ed" stop-opacity="0.8"/>
    </radialGradient>
    <radialGradient id="lens-sheen" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="lens-clip">
      <circle cx="200" cy="210" r="106"/>
    </clipPath>
  </defs>

  <g id="icon">
    <!-- Magnifying glass body -->
    <circle cx="200" cy="210" r="120" fill="none" stroke="#2563EB" stroke-width="24"/>
    <!-- Glass fill with gradient -->
    <circle cx="200" cy="210" r="108" fill="url(#lens-glass)"/>
    <!-- Glass sheen overlay -->
    <circle cx="200" cy="210" r="108" fill="url(#lens-sheen)"/>
    <!-- Handle -->
    <line x1="285" y1="295" x2="380" y2="390" stroke="#2563EB" stroke-width="28" stroke-linecap="round"/>

    <!-- Network graph clipped to lens -->
    <g id="graph-nodes" clip-path="url(#lens-clip)">
      <!-- Edges -->
      <line x1="160" y1="155" x2="230" y2="165" stroke="#2563EB" stroke-width="6" opacity="0.5"/>
      <line x1="160" y1="155" x2="145" y2="230" stroke="#2563EB" stroke-width="6" opacity="0.5"/>
      <line x1="230" y1="165" x2="200" y2="215" stroke="#2563EB" stroke-width="6" opacity="0.5"/>
      <line x1="145" y1="230" x2="200" y2="215" stroke="#2563EB" stroke-width="6" opacity="0.5"/>
      <line x1="200" y1="215" x2="260" y2="235" stroke="#2563EB" stroke-width="6" opacity="0.5"/>
      <line x1="200" y1="215" x2="175" y2="280" stroke="#2563EB" stroke-width="6" opacity="0.5"/>
      <line x1="260" y1="235" x2="235" y2="285" stroke="#2563EB" stroke-width="6" opacity="0.5"/>
      <line x1="175" y1="280" x2="235" y2="285" stroke="#2563EB" stroke-width="6" opacity="0.5"/>

      <!-- Nodes -->
      <circle cx="160" cy="155" r="12" fill="#2563EB"/>
      <circle cx="230" cy="165" r="11" fill="#2563EB"/>
      <!-- Center node — highlighted -->
      <circle cx="200" cy="215" r="16" fill="#1D4ED8"/>
      <circle cx="200" cy="215" r="22" fill="none" stroke="#1D4ED8" stroke-width="2" opacity="0.35"/>
      <circle cx="145" cy="230" r="10" fill="#2563EB"/>
      <circle cx="260" cy="235" r="11" fill="#2563EB"/>
      <circle cx="175" cy="280" r="10" fill="#2563EB"/>
      <circle cx="235" cy="285" r="9" fill="#2563EB"/>
    </g>

    <!-- Subtle rim -->
    <circle cx="200" cy="210" r="108" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.15"/>
  </g>

  <g id="wordmark">
    <text x="460" y="280" font-family="Helvetica, Arial, sans-serif" font-size="180" font-weight="bold" fill="#1E293B" letter-spacing="-4">G-Lab</text>
  </g>
</svg>
